# -----------------------------
# Application name
# -----------------------------
spring.application.name=atm_backend

# -----------------------------
# Datasource (PostgreSQL)
# -----------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/atm_db?currentSchema=public&serverTimezone=Asia/Kolkata
spring.datasource.username=om_2026
spring.datasource.password=manager2026
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------
# Jackson (JSON serialization)
# -----------------------------
spring.jackson.time-zone=Asia/Kolkata

# -----------------------------
# Logging
# -----------------------------
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# -----------------------------
# Management / Actuator endpoints
# -----------------------------
management.endpoints.web.exposure.include=*

# -----------------------------
# Async Configuration
# -----------------------------
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=async-

# -----------------------------
# Docker Compose
# -----------------------------
spring.docker.compose.enabled=false
